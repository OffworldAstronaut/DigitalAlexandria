<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="/css/style_books.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Math&display=swap" rel="stylesheet">
    <script>
      MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"]],
          displayMath: [["\\[", "\\]"]],
          processEscapes: true
        },
      };
    </script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"
    ></script>
  </head>
  <body>
    <div class="main">
      <header>
        <h1>{{TITLE}}</h1>
      </header>
      <nav class="nav-back">
        <button onclick="history.back()"><strong>Voltar</strong></button>
        <button id="theme-toggle" aria-label="Toggle dark mode"><b>🌙 Trevas</b></button>
      </nav>
      <div class="book-content">{{CONTENT}}</div>
    </div>
    <script>
      const btn = document.getElementById('theme-toggle');
      const root = document.documentElement;

      function setTheme(theme) {
          root.style.colorScheme = theme;
          localStorage.setItem('theme', theme);
          btn.textContent = theme === 'dark' ? '☀️ Luz' : '🌙 Trevas';
          document.body.classList.toggle('dark', theme === 'dark');
      }

      // Restore saved preference on page load
      const saved = localStorage.getItem('theme') || 'light';
      setTheme(saved);

      btn.addEventListener('click', () => {
          const current = root.style.colorScheme || 'light';
          setTheme(current === 'light' ? 'dark' : 'light');
      });
    </script>
  </body>
</html>
